name: CI & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          mkdir dist
          $version = if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') { $Matches[1] } else { "0.1.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package portable zip
        shell: pwsh
        run: |
          Copy-Item "target/release/rmeters.exe" -Destination "dist/"
          Copy-Item "README.md" -Destination "dist/"
          Compress-Archive -Path "dist/rmeters.exe", "dist/README.md" -DestinationPath "dist/rmeters-windows-x64-portable.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rmeters-build
          path: |
            dist/rmeters-setup.exe
            dist/rmeters-windows-x64-portable.zip

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rmeters-setup.exe
            dist/rmeters-windows-x64-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
